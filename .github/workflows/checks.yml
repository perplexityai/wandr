name: checks

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

env:
  PYTHONPATH: ${{ github.workspace }}/agents

jobs:
  config:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6
        with:
          python-version: "3.12"
          enable-cache: true
      - run: uv --no-config lock --check
      - run: uv --no-config run --locked python scripts/validate_configs.py

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6
        with:
          python-version: "3.12"
          enable-cache: true
      - name: Lint maintained source and tooling
        run: >-
          uv --no-config run --locked ruff check
          agents/relay agents/sitecustomize.py
          adapters/wandr/src/wandr scripts
      - name: Check tooling formatting
        run: >-
          uv --no-config run --locked ruff format --check
          scripts

  consistency:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6
        with:
          python-version: "3.12"
          enable-cache: true
      - run: uv --no-config run --locked python adapters/wandr/src/wandr/utils/consistency.py

  dockerfile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - run: docker build --check datasets/wandr/smoke/environment
